<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StackHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #6c8bef;
      --user-bg: #1e2a1e;
      --user-border: #2a4a2a;
      --card-bg: #141414;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo span { color: var(--accent); }

    button.icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: color 0.15s, border-color 0.15s;
    }

    button.icon-btn:hover { color: var(--text); border-color: #444; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message { display: flex; flex-direction: column; gap: 4px; }
    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-label { font-size: 11px; color: var(--muted); padding: 0 4px; }

    .recommendation { display: flex; flex-direction: column; gap: 20px; width: 100%; }

    .rec-summary {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .rec-summary .rec-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .stack-list { display: flex; flex-direction: column; gap: 20px; }

    .stack-item { display: flex; flex-direction: column; gap: 4px; }

    .stack-item-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .item-tool {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .item-category {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .item-reason {
      font-size: 14px;
      color: #bbb;
      line-height: 1.65;
    }

    .item-url a {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.15s;
    }

    .item-url a:hover { opacity: 1; }

    .rec-footer { font-size: 12px; color: var(--muted); text-align: center; padding: 4px 0 8px; }

    .starter-prompt-block {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .starter-prompt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .starter-prompt-header span {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      transition: color 0.15s, border-color 0.15s;
    }

    .copy-btn:hover { color: var(--text); border-color: #444; }
    .copy-btn.copied { color: #6dbf7e; border-color: #6dbf7e; }

    .starter-prompt-text {
      padding: 14px;
      font-size: 13px;
      color: #bbb;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .input-area {
      padding: 16px 0 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap { display: flex; gap: 10px; align-items: flex-end; }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.15s;
      overflow-y: auto;
    }

    textarea:focus { outline: none; border-color: #444; }
    textarea::placeholder { color: var(--muted); }
    textarea:disabled { opacity: 0.5; }

    button#send {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.15s;
      flex-shrink: 0;
      height: 48px;
    }

    button#send:hover { opacity: 0.85; }
    button#send:disabled { opacity: 0.4; cursor: not-allowed; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    #empty-state h2 { font-size: 22px; color: var(--text); font-weight: 600; }
    #empty-state p { font-size: 14px; max-width: 400px; line-height: 1.6; }

    .examples { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }

    .example-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .example-chip:hover { color: var(--text); border-color: #444; }

    .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }

    .typing span {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <div class="logo">Stack<span>Hub</span></div>
  <button class="icon-btn" id="new-btn">New</button>
</header>

<main>
  <div id="empty-state">
    <h2>What are you building?</h2>
    <p>Describe your project, idea, or goal and get a precise tech stack recommendation.</p>
    <div class="examples">
      <div class="example-chip">An app idea I can't code myself</div>
      <div class="example-chip">A SaaS I want to launch solo</div>
      <div class="example-chip">An AI-powered tool</div>
      <div class="example-chip">An online store</div>
      <div class="example-chip">An internal team tool</div>
    </div>
  </div>

  <div id="messages" class="hidden"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Describe your project or idea…" rows="1"></textarea>
      <button id="send">Send</button>
    </div>
  </div>
</main>

<script>
  // After deploying your Cloudflare Worker, replace this with your worker URL.
  const WORKER_URL = 'https://stackhub-proxy.stackhub.workers.dev';

  const SYSTEM_PROMPT = `You are StackHub, a tool that helps non-technical and vibe-coder types figure out exactly what software, AI tools, and services they should use to build their idea — without needing to know how to code.

Your recommendations should focus on:
- AI builders and coding assistants (e.g. Lovable, Bolt.new, Cursor, v0, Claude Code)
- Backend and database services (e.g. Supabase, Firebase, Convex)
- Hosting and deployment (e.g. Vercel, Netlify, Railway)
- Auth services (e.g. Clerk, Supabase Auth)
- Payment tools (e.g. Stripe, Lemon Squeezy)
- AI/LLM APIs (e.g. Claude, OpenAI, Groq)
- Email services (e.g. Resend, Loops)
- File storage (e.g. Cloudflare R2, Uploadthing)
- Analytics (e.g. PostHog, Plausible)
- Design/UI tools (e.g. shadcn/ui, Framer, Tailwind)
- CMS or content tools (e.g. Notion API, Sanity)
- Any other SaaS or no-code tool that fits

Do NOT recommend programming languages or generic frameworks as primary tools. Focus on concrete products and services a person can sign up for and start using today.

PHASE 1 — CLARIFICATION:
Ask only what you need to choose the right tools — nothing more. The structural and implementation details will be handled later by another AI once the user has their starter prompt.

The only thing that meaningfully changes which tools you recommend is scale — personal/small use vs. something that needs to handle many users. That's it. Do not ask about monetization, business model, whether it'll be paid or free, timelines, team size, technical level, or implementation details. Those are irrelevant to tool selection.

Ask whatever questions you need to make a confident recommendation — but only questions that would actually change which tools you pick. Things like scale, what the core features are, whether it needs user accounts, file uploads, real-time data, AI capabilities, etc. Skip straight to [READY_TO_RECOMMEND] if you already have enough.

When you have what you need, end your message with exactly this on its own line:
[READY_TO_RECOMMEND]

PHASE 2 — RECOMMENDATION:
Before settling on any tool, think deeply and broadly. Survey the full landscape — including newer, niche, or purpose-built tools that most people haven't heard of. Do not default to whatever is most popular or most mentioned in tutorials. Ask yourself: is there a tool built specifically for this use case that outperforms the generic options? Is there something newer that solves this more elegantly? Actively look past the obvious choices.

For each component of the stack, mentally compare at least 3–5 real options before choosing one. Favour tools that are:
- Purpose-built for the use case rather than general-purpose
- Genuinely best-in-class, even if lesser-known
- A realistic fit for this person's technical level and budget

Respond with ONLY a valid JSON object (no markdown, no text outside the JSON):
{
  "summary": "One sentence describing what we're building",
  "stack": [
    {
      "category": "What this tool does in plain English (e.g. Build & Deploy, Database, Payments)",
      "tool": "Tool Name",
      "reason": "2-3 sentences explaining why this is the right pick for this specific project. Be direct and practical. If it's lesser-known, briefly explain what it is.",
      "url": "https://tool-homepage.com"
    }
  ],
  "starter_prompt": "A ready-to-use prompt the user can paste into Claude Code or another AI assistant to start building. Write it in first person as if the user is speaking to the AI. It should: describe what they're building and who it's for, list the chosen tools with a one-line reason for each, and ask the AI to help them get started — including asking any clarifying questions about structure, features, and implementation details before beginning. The tone should be conversational and direct. 150 to 250 words."
}

Include 3–6 stack items. Only include tools that are genuinely needed. Every pick should be the single best tool for the job given this person's specific situation.`;

  let history = [];
  let awaitingRecommendation = false;

  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  document.querySelectorAll('.example-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      inputEl.value = chip.textContent;
      inputEl.focus();
      inputEl.dispatchEvent(new Event('input'));
    });
  });

  document.getElementById('new-btn').addEventListener('click', () => {
    history = [];
    awaitingRecommendation = false;
    messagesEl.innerHTML = '';
    messagesEl.classList.add('hidden');
    emptyState.classList.remove('hidden');
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setInputEnabled(true);
  });

  function setInputEnabled(enabled) {
    inputEl.disabled = !enabled;
    sendBtn.disabled = !enabled;
  }

  function showMessages() {
    emptyState.classList.add('hidden');
    messagesEl.classList.remove('hidden');
  }

  function appendMessage(role, content) {
    showMessages();
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'StackHub';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    msg.appendChild(label);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function appendTyping() {
    showMessages();
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = 'typing-indicator';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'StackHub';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    msg.appendChild(label);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderRecommendation(data) {
    showMessages();
    const msg = document.createElement('div');
    msg.className = 'message assistant';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'StackHub';

    const rec = document.createElement('div');
    rec.className = 'recommendation';
    rec.style.maxWidth = '100%';

    const summary = document.createElement('div');
    summary.className = 'rec-summary';
    summary.innerHTML = `<div class="rec-label">Your Stack</div>${data.summary}`;

    const list = document.createElement('div');
    list.className = 'stack-list';

    data.stack.forEach(item => {
      const el = document.createElement('div');
      el.className = 'stack-item';
      el.innerHTML = `
        <div class="stack-item-header">
          <span class="item-tool">${item.tool}</span>
          <span class="item-category">${item.category}</span>
        </div>
        <div class="item-reason">${item.reason}</div>
        ${item.url ? `<div class="item-url"><a href="${item.url}" target="_blank" rel="noopener">${item.url.replace(/^https?:\/\//, '')}</a></div>` : ''}
      `;
      list.appendChild(el);
    });

    if (data.starter_prompt) {
      const promptBlock = document.createElement('div');
      promptBlock.className = 'starter-prompt-block';

      const promptHeader = document.createElement('div');
      promptHeader.className = 'starter-prompt-header';
      promptHeader.innerHTML = '<span>Starter Prompt</span>';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = 'Copy';
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(data.starter_prompt).then(() => {
          copyBtn.textContent = 'Copied!';
          copyBtn.classList.add('copied');
          setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
        });
      });
      promptHeader.appendChild(copyBtn);

      const promptText = document.createElement('div');
      promptText.className = 'starter-prompt-text';
      promptText.textContent = data.starter_prompt;

      promptBlock.appendChild(promptHeader);
      promptBlock.appendChild(promptText);

      rec.appendChild(summary);
      rec.appendChild(list);
      rec.appendChild(promptBlock);
    } else {
      rec.appendChild(summary);
      rec.appendChild(list);
    }

    const footer = document.createElement('div');
    footer.className = 'rec-footer';
    footer.textContent = 'Ask follow-up questions or start a new conversation.';
    rec.appendChild(footer);

    msg.appendChild(label);
    msg.appendChild(rec);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  async function callWorker(messages, useThinking = false) {
    const body = {
      model: 'claude-sonnet-4-6',
      max_tokens: useThinking ? 16000 : 2048,
      system: SYSTEM_PROMPT,
      messages,
    };

    if (useThinking) {
      body.thinking = { type: 'enabled', budget_tokens: 10000 };
    }

    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Error ${response.status}`);
    }

    const data = await response.json();
    // Return only the text block (skip thinking blocks)
    const textBlock = data.content.find(b => b.type === 'text');
    return textBlock ? textBlock.text : '';
  }

  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text) return;

    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    setInputEnabled(false);
    appendTyping();

    try {
      const assistantText = await callWorker(history);
      removeTyping();

      if (assistantText.includes('[READY_TO_RECOMMEND]')) {
        const displayText = assistantText.replace('[READY_TO_RECOMMEND]', '').trim();
        if (displayText) appendMessage('assistant', displayText);
        history.push({ role: 'assistant', content: assistantText });

        history.push({ role: 'user', content: 'Please provide your recommendation now.' });
        appendTyping();

        const recText = await callWorker(history, true);
        removeTyping();

        try {
          renderRecommendation(JSON.parse(recText));
        } catch {
          appendMessage('assistant', recText);
        }
        history.push({ role: 'assistant', content: recText });
      } else {
        appendMessage('assistant', assistantText);
        history.push({ role: 'assistant', content: assistantText });
      }
    } catch (err) {
      removeTyping();
      appendMessage('assistant', `Error: ${err.message}`);
    }

    setInputEnabled(true);
  }
</script>
</body>
</html>
