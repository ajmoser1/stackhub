<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StackHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #6c8bef;
      --user-bg: #1e2a1e;
      --user-border: #2a4a2a;
      --card-bg: #141414;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo span { color: var(--accent); }

    button.icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: color 0.15s, border-color 0.15s;
    }

    button.icon-btn:hover { color: var(--text); border-color: #444; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message { display: flex; flex-direction: column; gap: 4px; }
    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-label { font-size: 11px; color: var(--muted); padding: 0 4px; }

    .recommendation { display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .rec-summary {
      font-size: 13px;
      color: var(--muted);
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      line-height: 1.5;
    }

    .rec-summary strong {
      color: var(--text);
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stack-grid { display: flex; flex-direction: column; gap: 8px; }

    .stack-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 4px 16px;
      transition: border-color 0.15s;
    }

    .stack-card:hover { border-color: #3a3a3a; }

    .card-category {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      grid-column: 1;
      grid-row: 1 / 3;
      padding-top: 3px;
    }

    .card-tool { font-size: 15px; font-weight: 600; color: var(--accent); grid-column: 2; grid-row: 1; }
    .card-reason { font-size: 13px; color: #bbb; line-height: 1.5; grid-column: 2; grid-row: 2; }

    .card-url { grid-column: 2; grid-row: 3; margin-top: 4px; }
    .card-url a { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.15s; }
    .card-url a:hover { color: var(--accent); }

    .rec-footer { font-size: 12px; color: var(--muted); text-align: center; padding: 4px 0 8px; }

    .input-area {
      padding: 16px 0 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap { display: flex; gap: 10px; align-items: flex-end; }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.15s;
      overflow-y: auto;
    }

    textarea:focus { outline: none; border-color: #444; }
    textarea::placeholder { color: var(--muted); }
    textarea:disabled { opacity: 0.5; }

    button#send {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.15s;
      flex-shrink: 0;
      height: 48px;
    }

    button#send:hover { opacity: 0.85; }
    button#send:disabled { opacity: 0.4; cursor: not-allowed; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    #empty-state h2 { font-size: 22px; color: var(--text); font-weight: 600; }
    #empty-state p { font-size: 14px; max-width: 400px; line-height: 1.6; }

    .examples { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }

    .example-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .example-chip:hover { color: var(--text); border-color: #444; }

    .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }

    .typing span {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <div class="logo">Stack<span>Hub</span></div>
  <button class="icon-btn" id="new-btn">New</button>
</header>

<main>
  <div id="empty-state">
    <h2>What are you building?</h2>
    <p>Describe your project, idea, or goal and get a precise tech stack recommendation.</p>
    <div class="examples">
      <div class="example-chip">A solo SaaS product</div>
      <div class="example-chip">An internal company tool</div>
      <div class="example-chip">A mobile app for consumers</div>
      <div class="example-chip">An e-commerce store</div>
      <div class="example-chip">A data pipeline</div>
    </div>
  </div>

  <div id="messages" class="hidden"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Describe your project or idea…" rows="1"></textarea>
      <button id="send">Send</button>
    </div>
  </div>
</main>

<script>
  // After deploying your Cloudflare Worker, replace this with your worker URL.
  const WORKER_URL = 'https://stackhub-proxy.stackhub.workers.dev';

  const SYSTEM_PROMPT = `You are StackHub, an expert technology advisor. Your job is to recommend the single most effective tool for each component of a user's project or idea.

PHASE 1 — CLARIFICATION:
Before making any recommendations, you must fully understand the user's endeavor. Ask follow-up questions to clarify:
- Core purpose and goals
- Target audience and their technical level
- Scale expectations (personal use, small team, thousands of users, etc.)
- Budget constraints (free/open-source vs. paid services)
- Team size and technical expertise of the builders
- Deployment preferences or constraints
- Any existing tools, systems, or languages they're committed to
- Timeline or urgency

Ask questions conversationally. You can ask multiple related questions at once if it makes sense, but don't overwhelm. Keep asking until you have a clear, complete picture. Do NOT make recommendations during this phase.

When you are fully satisfied you have enough information, end your last clarifying message with exactly this token on its own line:
[READY_TO_RECOMMEND]

PHASE 2 — RECOMMENDATION:
When triggered, respond with ONLY a valid JSON object (no markdown, no explanation outside the JSON):
{
  "summary": "One sentence describing what we're building",
  "stack": [
    {
      "category": "short functional role (e.g. Frontend, Database, Auth, Hosting)",
      "tool": "Tool Name",
      "reason": "2-3 sentences: why this is the best choice for THIS specific project. Be specific, not generic.",
      "url": "https://homepage-of-tool.com"
    }
  ]
}

Include 3–6 stack items depending on complexity. Choose only tools that are genuinely needed. Every recommendation must be the single best tool for the job given the user's specific constraints.`;

  let history = [];
  let awaitingRecommendation = false;

  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  document.querySelectorAll('.example-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      inputEl.value = chip.textContent;
      inputEl.focus();
      inputEl.dispatchEvent(new Event('input'));
    });
  });

  document.getElementById('new-btn').addEventListener('click', () => {
    history = [];
    awaitingRecommendation = false;
    messagesEl.innerHTML = '';
    messagesEl.classList.add('hidden');
    emptyState.classList.remove('hidden');
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setInputEnabled(true);
  });

  function setInputEnabled(enabled) {
    inputEl.disabled = !enabled;
    sendBtn.disabled = !enabled;
  }

  function showMessages() {
    emptyState.classList.add('hidden');
    messagesEl.classList.remove('hidden');
  }

  function appendMessage(role, content) {
    showMessages();
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'StackHub';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    msg.appendChild(label);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function appendTyping() {
    showMessages();
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = 'typing-indicator';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'StackHub';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    msg.appendChild(label);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderRecommendation(data) {
    showMessages();
    const msg = document.createElement('div');
    msg.className = 'message assistant';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'StackHub';

    const rec = document.createElement('div');
    rec.className = 'recommendation';
    rec.style.maxWidth = '100%';

    const summary = document.createElement('div');
    summary.className = 'rec-summary';
    summary.innerHTML = `<strong>Your Stack</strong>${data.summary}`;

    const grid = document.createElement('div');
    grid.className = 'stack-grid';

    data.stack.forEach(item => {
      const card = document.createElement('div');
      card.className = 'stack-card';
      card.innerHTML = `
        <div class="card-category">${item.category}</div>
        <div class="card-tool">${item.tool}</div>
        <div class="card-reason">${item.reason}</div>
        ${item.url ? `<div class="card-url"><a href="${item.url}" target="_blank" rel="noopener">${item.url.replace(/^https?:\/\//, '')}</a></div>` : ''}
      `;
      grid.appendChild(card);
    });

    const footer = document.createElement('div');
    footer.className = 'rec-footer';
    footer.textContent = 'Ask follow-up questions or start a new conversation.';

    rec.appendChild(summary);
    rec.appendChild(grid);
    rec.appendChild(footer);

    msg.appendChild(label);
    msg.appendChild(rec);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  async function callWorker(messages) {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2048,
        system: SYSTEM_PROMPT,
        messages,
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Error ${response.status}`);
    }

    const data = await response.json();
    return data.content[0].text;
  }

  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text) return;

    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    setInputEnabled(false);
    appendTyping();

    try {
      const assistantText = await callWorker(history);
      removeTyping();

      if (assistantText.includes('[READY_TO_RECOMMEND]')) {
        const displayText = assistantText.replace('[READY_TO_RECOMMEND]', '').trim();
        if (displayText) appendMessage('assistant', displayText);
        history.push({ role: 'assistant', content: assistantText });

        history.push({ role: 'user', content: 'Please provide your recommendation now.' });
        appendTyping();

        const recText = await callWorker(history);
        removeTyping();

        try {
          renderRecommendation(JSON.parse(recText));
        } catch {
          appendMessage('assistant', recText);
        }
        history.push({ role: 'assistant', content: recText });
      } else {
        appendMessage('assistant', assistantText);
        history.push({ role: 'assistant', content: assistantText });
      }
    } catch (err) {
      removeTyping();
      appendMessage('assistant', `Error: ${err.message}`);
    }

    setInputEnabled(true);
  }
</script>
</body>
</html>
